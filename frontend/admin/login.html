<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - GMIT Yegar Sahaduta Bello</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #123a5a 0%, #1e5a96 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-header img {
      width: 80px;
      height: 80px;
      margin-bottom: 15px;
    }

    .login-header h1 {
      color: #123a5a;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #666;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #123a5a;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle button {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #666;
      padding: 5px;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #123a5a 0%, #1e5a96 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(18,58,90,0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #dc3545;
      display: none;
      font-size: 14px;
    }

    .error-message.show {
      display: block;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .back-home {
      text-align: center;
      margin-top: 20px;
    }

    .back-home a {
      color: #123a5a;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .back-home a:hover {
      color: #1e5a96;
      text-decoration: underline;
    }

    .info-box {
      background: #d1ecf1;
      color: #0c5460;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #17a2b8;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 25px;
      }

      .login-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔐 Admin Panel</h1>
      <p>GMIT Yegar Sahaduta Bello</p>
    </div>

    <!-- Demo login box removed -->

    <div id="error-message" class="error-message"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-toggle">
          <input type="password" id="password" name="password" required autocomplete="current-password">
          <button type="button" onclick="togglePassword()">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="back-home">
      <a href="../Beranda.html">← Kembali ke Beranda</a>
    </div>
  </div>

  <script src="../assets/js/api-client.js"></script>
  <script>
    // API client is global - no need to override base URL again
    console.log('Admin Login - API Base URL:', api.baseUrl);

    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
    }

    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
      
      setTimeout(() => {
        errorDiv.classList.remove('show');
      }, 3000);
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        // Try API login first (dari backend MongoDB)
        const response = await api.login(username, password);
        
        // Set session untuk kompatibilitas dengan sistem lama
        sessionStorage.setItem('adminLoggedIn', 'true');
        sessionStorage.setItem('adminUsername', username);
        
        console.log('✅ Login berhasil via API');
        window.location.href = './index.html';
      } catch (err) {
        console.error('API Login error:', err.message);
        
        // Fallback: cek login lokal (untuk testing tanpa backend)
        if (username === 'admin' && password === 'kerjapraktik2025') {
          sessionStorage.setItem('adminLoggedIn', 'true');
          sessionStorage.setItem('adminUsername', username);
          console.log('✅ Login berhasil (fallback lokal)');
          window.location.href = './index.html';
        } else {
          showError('Username atau password salah!');
        }
      }
    }

    // Check if already logged in
    document.addEventListener('DOMContentLoaded', function() {
      if (sessionStorage.getItem('adminLoggedIn') === 'true') {
        window.location.href = './index.html';
      }
    });
  </script>
</body>
</html>
